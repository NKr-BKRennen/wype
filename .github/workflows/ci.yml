name: CI Build

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            automake \
            autoconf \
            autotools-dev \
            libncurses5-dev \
            libparted-dev \
            libconfig-dev \
            libconfig++-dev \
            libmicrohttpd-dev \
            libcjson-dev \
            libcurl4-openssl-dev \
            smartmontools \
            hdparm

      - name: Generate autoconf files
        run: ./autogen.sh

      - name: Configure
        run: ./configure --prefix=/usr CFLAGS='-O2 -g -Wall -Wextra'

      - name: Build
        run: make -j$(nproc)
